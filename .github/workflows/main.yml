on: [push]

concurrency:
  group: ${{ github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v3
      - name: Build
        run: cd lambdas && ./gradlew build
      - name: Test
        run: cd lambdas && ./gradlew test
      - name: Integration test
        run: |
          docker compose up -d
          sleep 3
          cd lambdas && ./gradlew integrationTest
          docker compose down
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend
        run: cd frontend && npm ci && npm run build
      - name: Lint frontend
        run: cd frontend && npm run lint

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build jar
        run: cd lambdas && ./gradlew shadowJar
      - name: Install CDK dependencies
        run: cd cdk && npm install
      - name: CDK deploy
        run: cd cdk && npx cdk deploy --require-approval never
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
          CDK_ACCOUNT_ID: ${{ secrets.DEV_CDK_ACCOUNT_ID }}
          CDK_DB_PASSWORD: ${{ secrets.DEV_CDK_DB_PASSWORD }}
          CDK_API_DOMAIN: api.dev.predictaball.live
          CDK_FRONTEND_DOMAIN: dev.predictaball.live
          CDK_VERCEL_CNAME: e99e15f96fe913bd.vercel-dns-017.com
      - name: Health check
        run: |
          sleep 30
          ALB_URL=$(aws elbv2 describe-load-balancers --query 'LoadBalancers[0].DNSName' --output text)
          curl -f http://$ALB_URL/ping
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
